services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    hostname: mongodb
    volumes:
      - ./docker/mongodb/init.d/:/docker-entrypoint-initdb.d/:ro
      - mongodb-data:/data/db/
    env_file:
      - .env
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_SHOULD_VALIDATE_COLLECTIONS=${MONGO_SHOULD_VALIDATE_COLLECTIONS}
    ports:
      - "${MONGO_PORT_HOST}:${MONGO_PORT_CONTAINER}"

volumes:
  mongodb-data:
    driver: local
    name: mongodb-data
